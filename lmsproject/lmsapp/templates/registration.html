{% extends "parent.html" %}
{% block main %}

{% if messages %}
   {% for message in messages %}
     <div class="alert alert-warning alert-dismissible fade show" role="alert">
      <strong>{{message}}</strong>
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
     </div>
   {% endfor %}
{% endif %}

<script>
    function validate()
    {
      var rollno=document.getElementById("rollno");
      var name=document.getElementById("name");
      var fname=document.getElementById("fname");
      var mname=document.getElementById("mname");
      var contactno=document.getElementById("contactno");
      var emailaddress=document.getElementById("emailaddress");
      var emailexp=/^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+$/;
      var password=document.getElementById("password");
      var confirmpassword=document.getElementById("confirmpassword");
    
    if(rollno.value=="" || rollno.value==null)
    {
        alert('Please enter rollno');
        rollno.focus();
    }
    else if(isNaN(rollno.value))
    {
        alert('enter numbers only');
        rollno.focus();
    }
    else if(name.value=="" || name.value==null)
    {
        alert('Please enter name');
        name.focus();
    }
    else if(fname.value=="" ||fname.value==null)
    {
        alert('Please enter father');
        fname.focus();
    }
    else if(mname.value=="" || mname.value==null)
    {
        alert('Please enter Mother');
        mname.focus();
    }
    else if(emailaddress.value=="" || emailaddress.value==null)
    {
        alert('Please enter email address');
        emailaddress.focus();
    }
    else if(contactno.value=="" || contactno.value==null)
    {
        alert('Please Enter Contact No');
        contactno.focus();
    }
    else if(isNaN(contactno.value))
    {
        alert('Please Enter numbers only');
        contactno.focus();
    }
    else if(contactno.value.length!=10)
    {
        alert('Please enter 10  digit number');
        contactno.focus();
    }
    else if(emailaddress.value=="" || emailaddress.value==null)
    {
        alert('Please enter email address');
        emailaddress.focus();
    }
    else if(!emailexp.test(emailaddress.value))
    {
        alert('Please enter valid emailaddress');
        emailaddress.focus();
    }
    else if(password.value=="" || password.value==null)
    {
        alert('Please enter password');
        password.focus();
    }
    else if(password.value.length<8)
    {
        alert('Please enter only 8 character');
        password.focus();
    }
    else if(confirmpassword.value=="" || confirmpassword.value==null)
    {
        alert('Please enter confirm password');
        confirmpassword.focus();
    }
    else if(password.value!=confirmpassword.value)
    {
        alert('confirm password is not matched with password');
        confirmpassword.focus();
    }
    else
    {
        document.getElementById("frmregistration").submit();
    }
    }
</script>

<style>
.registration-card {
    max-width: 950px;
    margin: 50px auto;
    padding: 40px;
    border-radius: 15px;
    background:  rgb(200, 194, 201);
    box-shadow: 0 12px 30px rgba(0,0,0,0.12);
}

.registration-title {
    text-align: center;
    font-weight: 700;
    margin-bottom: 30px;
    color: #8B0000;
}

.form-label {
    font-weight: 600;
}

.form-control, .form-select {
    border-radius: 8px;
    padding: 10px;
}

.form-control:focus, .form-select:focus {
    border-color: #8B0000;
    box-shadow: 0 0 0 0.2rem rgba(139,0,0,0.15);
}

.gender-group {
    display: flex;
    gap: 30px;
    padding-top: 8px;
}

.btn-register {
    background: linear-gradient(90deg,#8B0000,#B22222);
    border: none;
    padding: 10px 35px;
    font-weight: 600;
    border-radius: 8px;
    color: white;
}

.btn-register:hover {
    opacity: 0.9;
}
</style>

<div class="registration-card">

<h2 class="registration-title">Student Registration Form</h2>

<form id="frmregistration" method="post"
      onsubmit="event.preventDefault();validate();"
      action="{% url 'lmsapp:registration' %}">

{% csrf_token %}

<div class="row g-3">

<div class="col-md-6">
<label class="form-label">Roll No</label>
<input type="number" name="rollno" id="rollno" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">Full Name</label>
<input type="text" name="name" id="name" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">Father Name</label>
<input type="text" name="fname" id="fname" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">Mother Name</label>
<input type="text" name="mname" id="mname" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">Gender</label>
<div class="gender-group">
<div class="form-check">
<input type="radio" name="gender" value="Male" class="form-check-input"> Male
</div>
<div class="form-check">
<input type="radio" name="gender" value="Female" class="form-check-input"> Female
</div>
</div>
</div>

<div class="col-md-6">
<label class="form-label">Contact No</label>
<input type="number" name="contactno" id="contactno" class="form-control">
</div>

<div class="col-12">
<label class="form-label">Address</label>
<textarea name="address" class="form-control" rows="3"></textarea>
</div>

<div class="col-md-4">
<label class="form-label">Program</label>
<select name="program" class="form-select">
<option selected>-select program</option>
{% for p in program %}
<option value="{{p.program}}">{{p.program}}</option>
{% endfor %}
</select>
</div>

<div class="col-md-4">
<label class="form-label">Branch</label>
<select name="branch" class="form-select">
<option selected>-select Branch</option>
{% for b in branch %}
<option value="{{b.branch}}">{{b.branch}}</option>
{% endfor %}
</select>
</div>

<div class="col-md-4">
<label class="form-label">Year</label>
<select name="year" class="form-select">
<option selected>-Select Year</option>
{% for y in year %}
<option value="{{y.year}}">{{y.year}}</option>
{% endfor %}
</select>
</div>

<div class="col-md-6">
<label class="form-label">Email Address</label>
<input type="text" name="emailaddress" id="emailaddress" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">Password</label>
<input type="password" name="password" id="password" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">Confirm Password</label>
<input type="password" name="confirmpassword" id="confirmpassword" class="form-control">
</div>

<div class="col-12 text-center mt-4">
<button type="submit" class="btn btn-register">
Register
</button>
</div>

</div>
</form>
</div>

{% endblock main %}
