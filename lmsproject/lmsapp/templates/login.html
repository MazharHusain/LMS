{% extends "parent.html" %}
{% block main %}

{% if messages %}
   {% for message in messages %}
     <div class="alert alert-warning alert-dismissible fade show" role="alert">
      <strong>{{message}}</strong>
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
     </div>
   {% endfor %}
{% endif %}

<script>
    function validate()
    {
        var userid=document.getElementById("userid");
        var password=document.getElementById("password");
        if(userid.value=="" || userid.value==null)
        {
            alert('Please enter userid');
            userid.focus();
        }
        else if(password.value=="" || password.value==null)
        {
            alert('Please enter Password');
            password.focus();
        }
        else 
        {
            document.getElementById("frmlogin").submit();
        }
    }
</script>

<style>
.login-card {
    max-width: 600px;
    margin: 70px auto;
    padding: 40px;
    border-radius: 15px;
    background: rgb(200, 194, 201);
    box-shadow: 0 12px 30px rgba(0,0,0,0.12);
}

.login-title {
    text-align: center;
    font-weight: 700;
    margin-bottom: 30px;
    color: #8B0000;
}

.form-label {
    font-weight: 600;
}

.form-control, .form-select {
    border-radius: 8px;
    padding: 10px;
}

.form-control:focus, .form-select:focus {
    border-color: #8B0000;
    box-shadow: 0 0 0 0.2rem rgba(139,0,0,0.15);
}

.btn-login {
    background: linear-gradient(90deg,#8B0000,#B22222);
    border: none;
    padding: 10px 35px;
    font-weight: 600;
    border-radius: 8px;
    color: white;
}

.btn-login:hover {
    opacity: 0.9;
}
</style>

<div class="login-card">

<h2 class="login-title">Login Form</h2>

<form id="frmlogin" method="post"
      onsubmit="event.preventDefault();validate();"
      action="{% url 'lmsapp:login' %}">

{% csrf_token %}

<div class="mb-3">
<label class="form-label">UserId / Roll No</label>
<input type="text" name="userid" id="userid" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input type="password" name="password" id="password" class="form-control">
</div>

<div class="mb-4">
<label class="form-label">User Type</label>
<select name="usertype" class="form-select">
<option selected>-Select Usertype</option>
<option value="student">Student</option>
<option value="admin">Admin</option>
</select>
</div>

<div class="text-center">
<button type="submit" class="btn btn-login">
Login
</button>
</div>

</form>
</div>

{% endblock main %}
